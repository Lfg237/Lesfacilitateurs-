<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesfacilitateurs Middleman</title>
<meta name="theme-color" content="#6200ea">

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f4f4f9;
  padding-top:160px;
  padding-bottom:60px;
  overflow-x:hidden;
}

header {
  background:#6200ea;
  color:white;
  padding:1rem;
  text-align:center;
  font-size:1.3rem;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;
}

#clock { font-size:1rem; margin-top:5px; }

.menu-toggle {
  position:absolute;
  left:15px;
  top:15px;
  font-size:1.5rem;
  cursor:pointer;
}

.menu {
  display:none;
  position:fixed;
  top:0;
  left:0;
  height:100%;
  width:250px;
  background:#3700b3;
  padding:1rem;
  z-index:2000;
  overflow-y:auto;
}

.menu a { display:block; color:white; padding:10px; text-decoration:none; }
.menu.show { display:block; }

.menu-close { text-align:right; font-size:1.5rem; cursor:pointer; color:white; margin-bottom:10px; }

/* SLIDESHOW */
.slideshow {
  width:100%;
  height:200px;
  overflow:hidden;
}

.slides {
  display:flex;
  width:100%;
  height:100%;
  transition:transform 0.8s ease;
}

.slides img {
  width:100%;
  height:200px;
  object-fit:cover;
}

/* GALLERY */
.gallery-wrapper {
  position:relative;
  margin:10px 0;
}

.video-gallery {
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
  scroll-behavior:smooth;
}

.video-gallery iframe,
.video-gallery img {
  flex:0 0 auto;
  width:300px;
  height:200px;
  border-radius:8px;
  background:#000;
}

.video-gallery img {
  object-fit:contain;
}

/* boutons galerie */
.gallery-btn {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#6200ea;
  color:white;
  border:none;
  padding:10px;
  border-radius:50%;
  cursor:pointer;
}

#prevBtn { left:0; }
#nextBtn { right:0; }

/* BANDE ANNONCE DÉROULANTE */
.trailers-scroll{
  display:flex;
  gap:15px;
  overflow-x:auto;
  padding:10px;
  background:#fff;
  border-radius:10px;
}
.trailers-scroll{
  display:flex;
  gap:15px;
  overflow-x:auto;
  padding:10px;
  background:#fff;
  border-radius:10px;

  flex-wrap:nowrap;         /* IMPORTANT */
  scroll-behavior:smooth;   /* fluidité */
  -webkit-overflow-scrolling:touch;
}

.trail-item{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  gap:10px;
  background:#f2f2f2;
  padding:10px;
  border-radius:8px;
  min-width:300px;
}

/* bouton vert */
.reject{
  background:#00c853;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.reject:hover{
  background:#009624;
}

/* header buttons */
.header-buttons{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:5px;
}

.header-buttons button{
  background:#ff9800;
  border:none;
  color:white;
  padding:5px 10px;
  border-radius:5px;
}

footer{
  background:#3700b3;
  color:white;
  text-align:center;
  padding:1rem;
  position:fixed;
  bottom:0;
  width:100%;
}
</style>
</head>

<body>

<script>

/* CLOCK */
setInterval(()=>{
  document.getElementById("clock").innerText = new Date().toLocaleTimeString();
},1000);

/* MENU */
document.querySelector(".menu-toggle").onclick = () =>
  document.getElementById("menu").classList.add("show");

document.getElementById("menuClose").onclick = () =>
  document.getElementById("menu").classList.remove("show");

/* SLIDESHOW */
const images = [
"https://raw.githubusercontent.com/Lfg237/m-dias/main/InShot_20260318_085719267.jpg",
"https://raw.githubusercontent.com/Lfg237/m-dias/main/InShot_20260319_152611056.jpg",
"https://raw.githubusercontent.com/Lfg237/m-dias/main/file_00000000da147246a31c69c25552265f.png",
"https://raw.githubusercontent.com/Lfg237/images-Lesfacilitateurs-/main/InShot_20250824_072247867.jpg",
"https://raw.githubusercontent.com/Lfg237/images-Lesfacilitateurs-/main/IMG_20250227_152938.jpg",
"https://raw.githubusercontent.com/Lfg237/images-Lesfacilitateurs-/main/InShot_20250824_073145807.jpg",
"https://raw.githubusercontent.com/Lfg237/images-Lesfacilitateurs-/main/InShot_20250919_153621163.jpg",
"https://raw.githubusercontent.com/Lfg237/m-dias/main/InShot_20260414_100748560.jpg",
"https://raw.githubusercontent.com/Lfg237/m-dias/main/file_00000000853c71f48a6f9f7f9c411559.png"
"https://raw.githubusercontent.com/Lfg237/m-dias/main/InShot_20260319_152611056.jpg",
"https://raw.githubusercontent.com/Lfg237/m-dias/main/InShot_20260318_085719267.jpg",
"https://raw.githubusercontent.com/Lfg237/business-tv/main/Polish_20260210_113721977.png",
"https://raw.githubusercontent.com/Lfg237/images-Lesfacilitateurs-/main/file_000000009a3872469d746a3579869682.png"
];

const slideshow = document.getElementById("slideshow");
const track = document.createElement("div");
track.className="slides";
slideshow.appendChild(track);

images.forEach(src=>{
  const img=document.createElement("img");
  img.src=src;
  track.appendChild(img);
});

let i=0;
setInterval(()=>{
  i++;
  if(i>=images.length) i=0;
  track.style.transform=`translateX(-${i*100}%)`;
},3000);

/* GALERIE */
const gallery=document.getElementById("videoGallery");
document.getElementById("prevBtn").onclick=()=>gallery.scrollLeft-=300;
document.getElementById("nextBtn").onclick=()=>gallery.scrollLeft+=300;

/* REJET ANNONCE */
document.querySelectorAll(".reject").forEach(btn=>{
  btn.onclick=function(){
    const item=this.closest(".trail-item");
    item.style.transition="0.3s";
    item.style.opacity="0";
    item.style.transform="scale(0.8)";
    setTimeout(()=>item.remove(),300);
  };
});

/* HEADER BUTTONS */
const headerLinks=[
{ text: "mini secretariat", url: "https://documents-en-ligne.vercel.app/" },

{ text: "commerce des portraits", url: "https://retouche-photo-et-portrait.vercel.app/" },


{ text: "business tv", url: "https://business-tv.vercel.app/" },

   { text: "free groupe business", url: "https://b2-b-rho.vercel.app/" },
    
    { text:"Workshopkmer", url: "https://workshopkmer.vercel.app/#job1" },
    
    { text: "médecine sous l'abre", url: "https://assistant-ten-rho.vercel.app/" }
   ]; 

const container=document.getElementById("headerButtons");

headerLinks.forEach(l=>{
  let b=document.createElement("button");
  b.textContent=l.text;
  b.onclick=()=>window.open(l.url);
  container.appendChild(b);
});
const scrollBox = document.getElementById("trailersScroll");

let pos = 0;

setInterval(()=>{
  pos += 2;
  scrollBox.scrollLeft = pos;

  if(pos >= scrollBox.scrollWidth - scrollBox.clientWidth){
    pos = 0;
  }
},30);

</script>
